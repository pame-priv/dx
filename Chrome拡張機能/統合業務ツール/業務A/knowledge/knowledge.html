<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ナレッジ</title>
  <link rel="stylesheet" href="../../common/common.css">
  <link rel="stylesheet" href="../../common/image-modal/image-modal.css">
  <link rel="stylesheet" href="knowledge.css">
</head>
<body>
  <!-- 検索バーセクション -->
  <div class="search-section">
    <div class="search-bar">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="searchInput" class="search-input" placeholder="キーワードで検索...">
      <button class="search-clear" id="searchClear" style="display: none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="filter-dropdown" id="filterDropdown">
      <button class="filter-button" id="filterButton">
        <span class="filter-label" id="filterLabel">すべて</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <div class="filter-menu" id="filterMenu"></div>
    </div>
  </div>

  <div class="knowledge-container">
    <!-- サイドバー -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="back-button" id="backButton" style="display: none;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <h2 class="sidebar-title" id="sidebarTitle">カテゴリ</h2>
      </div>
      <nav class="category-list" id="categoryList"></nav>
    </aside>

    <!-- メインエリア -->
    <main class="main-content" id="mainContent">
      <div class="empty-state" id="emptyState">
        <p>カテゴリを選択してください</p>
      </div>
      <div class="knowledge-list" id="knowledgeList"></div>
    </main>

    <!-- モーダル -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" id="modal">
        <div class="modal-header-bar">
          <button class="modal-favorite-btn" id="modalFavorite"></button>
          <button class="modal-close" id="modalClose">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="modal-content">
          <h1 class="modal-title" id="modalTitle"></h1>
          <div class="modal-body" id="modalBody"></div>
          <div class="modal-note" id="modalNote"></div>
          <div class="copy-button-container">
            <button class="copy-content-btn" id="copyContentBtn">コンテンツをコピー</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../../common/common.js" type="module"></script>
  <script src="../../common/image-modal/image-modal.js" type="module"></script>
  <script src="knowledge.js" type="module"></script>
</body>
</html>
