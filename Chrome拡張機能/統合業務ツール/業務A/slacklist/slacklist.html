<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slack Lsit</title>
  <link rel="stylesheet" href="../../common/common.css">
  <link rel="stylesheet" href="../../common/image-modal/image-modal.css">
  <link rel="stylesheet" href="slacklist.css">
</head>
<body>
  <div class="page-content">
    <h1>Slackリスト連携</h1>
  </div>

  <div class="container-group">
    <!-- common.cssの.step-containerを使用 -->
    <div class="step-container">
        <h3>Slackリストに追加</h3>

        <!-- 1. URL読み取りセクション -->
        <div class="form-group">
            <button id="sl-fetch-url-btn">現在のURLを読み込む</button>
            <input type="text" id="sl-url-display" placeholder="ここにURLが表示されます" readonly>
        </div>

        <!-- 2. 備考入力 -->
        <div class="form-group">
            <label for="sl-title-input">備考:</label>
            <input type="text" id="sl-title-input" placeholder="備考を自由に入力（オプション）">
        </div>

        <!-- 3. カテゴリ選択 -->
        <div class="form-group">
            <label for="sl-category-select">カテゴリ:</label>
            <select id="sl-category-select">
                <!-- config.js の設定に基づいてJSが中身を生成します -->
            </select>
        </div>

        <!-- 4. 依頼者 -->
        <div class="form-group">
            <label for="sl-requestor-select">依頼者:</label>
            <select id="sl-requestor-select">
                <!-- config.js の設定に基づいてJSが中身を生成します -->
            </select>
        </div>

        <!-- 5. Slackへ追加ボタン -->
        <button id="sl-add-to-slack-btn">Slackリストに追加</button>
        
        <div id="sl-status-message"></div>
    </div>
  </div>


  <script src="../../common/common.js" type="module"></script>
  <script src="../../common/image-modal/image-modal.js" type="module"></script>
  <script src="config.js"></script>  
  <script src="slacklist.js"></script>
</body>
</html>
